# ── SplitMK Left (Central) — splitmk_left.conf 
# side which would connect to the computer and read data from the right side over BLE

# Core split BLE
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL=y

CONFIG_ZMK_KEYBOARD_NAME="SplitMK"

# general ble shenanigans
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_MAX_CONN=5         
CONFIG_BT_MAX_PAIRED=5

# encoder knob
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# USB power detection — lets ZMK switch between USB HID and BLE HID
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000   # 15 minutes in ms prolly would change to 10minutes idk

# Deep sleep on long idle (saves battery)
CONFIG_ZMK_PM_SOFT_OFF=y
