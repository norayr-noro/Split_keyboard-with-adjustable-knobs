# ── SplitMK Right (Peripheral) — splitmk_right.conf
# this side of the keyboard would be connected to the left side instead of the computer

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_ROLE_PERIPHERAL=y

CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y

#only needs USB for flashing cuz the other sid handles that + power saving yk
CONFIG_ZMK_USB=n

CONFIG_ZMK_LOG_LEVEL_WRN=y

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

CONFIG_ZMK_PM_SOFT_OFF=y
